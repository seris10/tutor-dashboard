name: Uptime Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  uptime:
    if: ${{ vars.UPTIME_URL != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check public app URL
        env:
          UPTIME_URL: ${{ vars.UPTIME_URL }}
        run: node monitoring/uptime-check.mjs
